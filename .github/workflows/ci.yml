name: CI

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    env:
      # The canonical template repo keeps its own identity tokens (@app/*,
      # app-monorepo-template) intentionally. ATL_TEMPLATE_SELF=1 tells
      # check-identity.mjs to skip the un-renamed guard for this repo only.
      # Derived projects must NOT set this variable — their validate fails
      # until they run `pnpm init <slug>`.
      ATL_TEMPLATE_SELF: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation gate
        run: pnpm validate

  expo-health:
    name: expo-health
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run expo health checks
        run: pnpm verify:expo

  mobile-export:
    name: mobile-export
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export mobile bundles
        run: pnpm --filter @app/mobile export:ci

      - name: Assert bundle output
        run: node scripts/assert-expo-export.mjs

  web-render:
    name: web-render
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @app/web build

      - name: Run web render smoke
        run: node scripts/smoke-web-render.mjs

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @app/web build

      - name: Run e2e tests
        run: pnpm exec playwright test
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  responsive:
    name: responsive
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: ${{ vars.RESPONSIVE_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @app/web build

      - name: Run responsive layout checks
        run: pnpm exec playwright test --project=mobile-390 --project=tablet-768 --project=desktop-1280 --project=desktop-1920
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-responsive
          path: playwright-report/

  mobile-web:
    name: mobile-web
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: validate
    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export mobile web build
        run: pnpm --filter @app/mobile export:web

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mobile-web smoke
        run: pnpm exec playwright test --project=mobile-web-390 --project=mobile-web-768 --project=mobile-web-1280 --project=mobile-web-1920

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-mobile-web
          path: playwright-report/
