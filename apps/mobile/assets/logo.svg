<!-- PLACEHOLDER LOGO — replace with your project logo.
     Project-owned asset slot (apps/mobile/assets is not propagated from the
     template), so swapping this file causes zero template-sync conflict.
     Keep a square viewBox so the AuthShell brand mark stays balanced. -->
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo placeholder">
  <defs>
    <linearGradient id="logoPlaceholderGradient" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a3d" />
      <stop offset="1" stop-color="#ff6a1a" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#logoPlaceholderGradient)" />
  <path d="M20 33.5 L28.5 42 L45 24" stroke="#2a1402" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
